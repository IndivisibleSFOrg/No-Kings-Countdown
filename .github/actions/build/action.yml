name: "Vercel Build"
description: "Checkout, install, cache, and build for Vercel deployment"

inputs:
  vercel_environment:
    description: "'production' or 'preview'"
    required: true
  vercel_build_prod:
    description: "Pass --prod to vercel build"
    required: false
    default: 'false'
  commit_ref:
    description: "Value for NUXT_PUBLIC_COMMIT_REF"
    required: true
  build_date:
    description: "Value for NUXT_PUBLIC_BUILD_DATE"
    required: true
  vercel_token:
    required: true
  vercel_org_id:
    required: true
  vercel_project_id:
    required: true

runs:
  using: "composite"
  steps:
    - name: Setup Node
      uses: actions/setup-node@v6
      with:
        node-version: "24"

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9

    # Expose the pnpm store path so the cache step can reference it.
    - name: Get pnpm store directory
      id: pnpm-cache
      shell: bash
      run: |
        echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

    # Cache node_modules keyed on the lockfile to speed up installs.
    - name: Setup pnpm cache
      uses: actions/cache@v5
      with:
        path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
        key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
        restore-keys: |
          ${{ runner.os }}-pnpm-store-

    # Capture git describe output (e.g. "1.3.0") and short SHA for
    # the NUXT_PUBLIC_* build vars injected below.
    - name: Get version info
      id: version
      shell: bash
      run: |
        echo "describe=$(git describe --always --tags --dirty=+)" >> $GITHUB_OUTPUT
        echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

    # Make .env vars (sheet URL, analytics keys, etc.) available to the build.
    - name: Load .env into environment
      shell: bash
      run: grep -v '^#' .env | grep '=' >> $GITHUB_ENV

    # Download Vercel project settings and env vars into .vercel/.
    - name: Pull Vercel environment
      shell: bash
      run: npx vercel pull --yes --environment=${{ inputs.vercel_environment }} --token=${{ inputs.vercel_token }}
      env:
        VERCEL_ORG_ID: ${{ inputs.vercel_org_id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel_project_id }}

    # Run the Nuxt build locally (pnpm generate) via the Vercel CLI so that
    # git tags are available and releaseVersionIndex is populated correctly.
    # Output lands in .vercel/output for the deploy step.
    - name: Build
      shell: bash
      run: |
        prod_flag=""
        [[ "${{ inputs.vercel_build_prod }}" == "true" ]] && prod_flag="--prod"
        npx vercel build $prod_flag --token=${{ inputs.vercel_token }}
      env:
        VERCEL_ORG_ID: ${{ inputs.vercel_org_id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel_project_id }}
        NUXT_PUBLIC_COMMIT_SHA: ${{ steps.version.outputs.describe }}
        NUXT_PUBLIC_COMMIT_SHORT_SHA: ${{ steps.version.outputs.short_sha }}
        NUXT_PUBLIC_COMMIT_REF: ${{ inputs.commit_ref }}
        NUXT_PUBLIC_BUILD_DATE: ${{ inputs.build_date }}
        NUXT_PUBLIC_RUN_ID: ${{ github.run_id }}
