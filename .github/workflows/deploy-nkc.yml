name: "Deploy NKC branch to preview.nokingscountdown.org"

on:
  push:
    branches:
      - no-kings-countdown

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      # Full history + all tags required so nuxt.config.ts can resolve
      # git describe (appVersion) and git for-each-ref (releaseVersionIndex).
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build
        uses: ./.github/actions/build
        with:
          vercel_environment: preview
          commit_ref: no-kings-countdown
          build_date: ${{ github.event.head_commit.timestamp }}
          vercel_token: ${{ secrets.VERCEL_TOKEN }}
          vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
          vercel_project_id: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to preview.nokingscountdown.org
        run: |
          url=$(npx vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }} \
            --meta githubCommitRef=no-kings-countdown \
            --meta githubCommitSha=${{ github.sha }} \
            --meta githubOrg=${{ github.repository_owner }} \
            --meta githubRepo=${{ github.event.repository.name }} \
            --meta githubCommitAuthorLogin=${{ github.actor }})
          npx vercel alias set "$url" preview.nokingscountdown.org --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
