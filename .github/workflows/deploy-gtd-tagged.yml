name: "Deploy GTD tag to goodtroubledaily.org"

on:
  push:
    tags:
      - '2.*.*'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Build
        uses: ./.github/actions/build
        with:
          vercel_environment: production
          vercel_build_prod: 'true'
          commit_ref: ${{ github.ref_name }}
          build_date: ${{ github.event.repository.updated_at }}
          vercel_token: ${{ secrets.VERCEL_TOKEN }}
          vercel_org_id: ${{ secrets.VERCEL_ORG_ID }}
          vercel_project_id: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to goodtroubledaily.org
        run: |
          npx vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --meta githubCommitRef=${{ github.ref_name }} \
            --meta githubCommitSha=${{ github.sha }} \
            --meta githubOrg=${{ github.repository_owner }} \
            --meta githubRepo=${{ github.event.repository.name }} \
            --meta githubCommitAuthorLogin=${{ github.actor }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
